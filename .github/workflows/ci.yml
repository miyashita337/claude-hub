name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

defaults:
  run:
    working-directory: supervisor

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            supervisor/node_modules
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('supervisor/bun.lock', 'supervisor/package.json') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bunx tsc --noEmit

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            supervisor/node_modules
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('supervisor/bun.lock', 'supervisor/package.json') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        env:
          SUPERVISOR_DB_PATH: ":memory:"
          TMUX_PATH: /usr/bin/tmux
        run: |
          bun test --coverage --coverage-reporter=lcov \
                   tests/session/output-formatter.test.ts \
                   tests/session/relay.test.ts \
                   tests/session/relay-server.test.ts \
                   tests/hooks/stop-relay.test.ts \
                   tests/infra/db.test.ts

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: supervisor/coverage/lcov.info
          flags: unit-tests
          fail_ci_if_error: false

  # Local-only tests (require tmux/Claude CLI or local config):
  #   manager.test.ts  — tmux + Claude Code CLI
  #   iterm2.test.ts   — ~/.claude/scripts/project-colors.json
