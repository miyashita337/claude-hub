name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

defaults:
  run:
    working-directory: supervisor

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            supervisor/node_modules
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('supervisor/bun.lock', 'supervisor/package.json') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bunx tsc --noEmit

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            supervisor/node_modules
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('supervisor/bun.lock', 'supervisor/package.json') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run CI-safe tests
        env:
          SUPERVISOR_DB_PATH: ":memory:"
          TMUX_PATH: /usr/bin/tmux
        run: |
          bun test tests/session/output-formatter.test.ts \
                   tests/session/relay-internals.test.ts \
                   tests/session/relay.test.ts \
                   tests/infra/db.test.ts

  # Integration tests (tmux + Claude Code CLI required) — local only:
  #   cd supervisor && SUPERVISOR_DB_PATH=":memory:" bun test tests/session/manager.test.ts
